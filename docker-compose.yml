services:
  # ----------------------------------------------------
  # Core Database Phase (PostgreSQL)
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: aladdin_postgres
    environment:
      POSTGRES_USER: aladdin_user
      POSTGRES_PASSWORD: aladdin_password
      POSTGRES_DB: aladdin_db
    ports:
      - "5432:5432" # Maps laptop port 5432 to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists the database physically on your laptop
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql # Runs once on first container start
    restart: unless-stopped

  # ----------------------------------------------------
  # In-Memory Cache Phase (Redis)
  # ----------------------------------------------------
  redis:
    image: redis:alpine
    container_name: aladdin_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ----------------------------------------------------
  # Message Broker Phase (Apache Kafka - KRaft Mode)
  # ----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aladdin_kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — Kafka is its own Brain (No Zookeeper needed)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    restart: unless-stopped

  # ----------------------------------------------------
  # Analytics Storage & Dashboard Phase (ELK Stack)
  # ----------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: aladdin_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disabled for local development simplicity
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Stop it from eating all your RAM
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: aladdin_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601" # Access via http://localhost:5601
    depends_on:
      - elasticsearch
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: aladdin_logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline # Config pipeline physical storage
      - ./logs:/usr/share/logstash/logs                 # Bridge: log files appear on your Windows machine
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m" # Prevent it from taking all your RAM
    ports:
      - "5044:5044" # Standard Beats port
      - "5000:5000" # Our custom TCP port
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ----------------------------------------------------
  # Workflow Orchestration Phase (Apache Airflow)
  # Uses existing postgres (metadata DB) + redis (Celery broker)
  # ----------------------------------------------------

  # One-shot init container: runs DB migrations & creates the admin user
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: aladdin_airflow_init
    depends_on:
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags                          # DAG files
      - ./Shell_Scripts:/opt/airflow/shell_scripts        # Bash scripts
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin"
    restart: on-failure

  # Airflow Webserver — UI accessible at http://localhost:8080
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: aladdin_airflow_webserver
    depends_on:
      - airflow-init
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__WORKERS: 1  # Crucial for low-RAM Windows machines
      AIRFLOW__WEBSERVER__WORKER_TIMEOUT: 120 # Give the single worker more time to load
    env_file:
      - .env
    ports:
      - "8080:8080"                        # http://localhost:8080 → Airflow UI
    volumes:
      - ./dags:/opt/airflow/dags
      - ./Shell_Scripts:/opt/airflow/shell_scripts        # Bash scripts
      - airflow_logs:/opt/airflow/logs
    command: webserver
    restart: unless-stopped

  # Airflow Scheduler — watches DAGs and triggers task execution
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: aladdin_airflow_scheduler
    depends_on:
      - airflow-init
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./Shell_Scripts:/opt/airflow/shell_scripts        # Bash scripts
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  # Airflow Worker — executes the actual tasks from the Celery queue
  airflow-worker:
    image: apache/airflow:2.9.1
    container_name: aladdin_airflow_worker
    depends_on:
      - airflow-init
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./Shell_Scripts:/opt/airflow/shell_scripts        # Bash scripts
      - airflow_logs:/opt/airflow/logs
    command: celery worker
    restart: unless-stopped

# This tells Docker to create a physical hard drive volume on your host machine
volumes:
  postgres_data:
  elastic_data:
  airflow_logs:   # Persists Airflow task logs across container restarts
