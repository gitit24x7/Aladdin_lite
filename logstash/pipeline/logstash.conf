input {
    kafka {
    bootstrap_servers => "aladdin_kafka:9092"
    topics => ["market-trades"]
    codec => json
    client_id => "logstash_analytics"
    group_id => "analytics_group"
  }
}

filter {
  # 1. MUTATE: Data Cleaning
  # Sometimes the API might send 'quantity' as a string ("50"). 
  # We force it into an integer here so Kibana can do math on it later.
  mutate {
    convert => {
      "quantity" => "integer"
      "price"    => "float"    # Cast price string → float so Kibana can aggregate (avg, sum exposure)
    }
  }

  # 2. DATE: Standardizing Timestamps
  # If the API sends a "trade_time" field, we map it identically to Elasticsearch's core @timestamp 
  date {
    match => [ "trade_time", "ISO8601" ]
    target => "@timestamp"
  }

  # 3. RUBY: Compute 6-hour window tag for file rotation
  # @timestamp.hour gives 0-23. We divide by 6 and multiply back to get the window start.
  # Result: "00-06", "06-12", "12-18", or "18-24"
  ruby {
    code => "
      hour = event.get('@timestamp').time.hour
      window_start = (hour / 6) * 6
      window_end = window_start + 6
      event.set('log_window', format('%02d-%02d', window_start, window_end))
    "
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "aladdin-logs-%{+YYYY.MM.dd}"
  }

  # Write to rotating local log files (mounted to your Windows machine via Docker volume)
  # File pattern: trades-2026-05-05-window-06-12.log
  # A new file is created automatically every 6 hours. Old files are preserved forever.
  file {
    path => "/usr/share/logstash/logs/trades/trades-%{+YYYY-MM-dd}-window-%{log_window}.log"
    codec => json_lines  # Each trade is written as one JSON line — easy to read and parse
  }

  stdout { codec => rubydebug }
}
